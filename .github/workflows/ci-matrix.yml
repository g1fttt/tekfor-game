name: CI — macOS & Windows Rust

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  call-reusable:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runner: [ macos-latest, windows-latest ]
    steps:
      - name: Call reusable Rust workflow
        uses: ./.github/workflows/reusable-rust.yml
        with:
          target: ${{ matrix.runner }}
